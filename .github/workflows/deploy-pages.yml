name: Build and deploy Telegram Mini App

on:
  push:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v6

      - name: Set up Java 8
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '8'

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v6

      - name: Build GWT game
        run: |
          chmod +x gradlew
          ./gradlew --no-daemon html:dist

      - name: Package Telegram Mini App
        env:
          TELEGRAM_AUTHOR_URL: ${{ vars.TELEGRAM_AUTHOR_URL }}
          STARS_INVOICE_50: ${{ vars.STARS_INVOICE_50 }}
          STARS_INVOICE_100: ${{ vars.STARS_INVOICE_100 }}
          STARS_INVOICE_250: ${{ vars.STARS_INVOICE_250 }}
        run: node telegram/build-telegram.mjs html/build/dist site

      - name: Validate deployable site
        run: |
          test -f site/index.html
          test -f site/.nojekyll
          test -f site/telegram-storage.js
          test -f site/html/html.nocache.js
          ! grep -q "SuperDev Refresh" site/index.html

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: site
          include-hidden-files: true

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
