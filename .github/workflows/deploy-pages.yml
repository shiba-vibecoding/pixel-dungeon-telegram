name: Build and deploy Telegram Mini App

on:
  push:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout source
        uses: actions/checkout@v6

      - name: Set up Java 8
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '8'

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v6

      - name: Validate translations
        run: |
          python tools/validate_localization.py
          for catalogue in android/assets/i18n/*.tsv; do
            python tools/audit_runtime_localization.py core/src "$catalogue" --fail-on-missing
          done
          node --test telegram/test-*.mjs

      - name: Build GWT game
        run: |
          chmod +x gradlew
          ./gradlew --no-daemon html:dist

      - name: Package Telegram Mini App
        run: node telegram/build-telegram.mjs html/build/dist site

      - name: Validate deployable site
        run: |
          test -f site/index.html
          test -f site/.nojekyll
          test -f site/telegram-storage.js
          test -f site/privacy.html
          test -f site/html/html.nocache.js
          test ! -d site/WEB-INF
          test ! -f site/stars-config.js
          grep -Eq 'telegram\.css\?v=[0-9a-f]{12}' site/index.html
          grep -Eq 'telegram-bootstrap\.js\?v=[0-9a-f]{12}' site/index.html
          ! grep -R -q -E "openDonation|Telegram Stars|Support with Telegram Stars" site
          ! grep -q "SuperDev Refresh" site/index.html

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: site
          include-hidden-files: true

  deploy:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
