name: Build and deploy Telegram Pixel Dungeon

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout source
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6

      - name: Set up Java 8
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5
        with:
          distribution: temurin
          java-version: '8'

      - name: Set up Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: '22'

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: '3.12'

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@90ddb51e90a5fd9ba75f40cf85156b7b41bf76a3 # v6

      - name: Validate translations
        run: |
          python tools/validate_localization.py
          for catalogue in android/assets/i18n/*.tsv; do
            python tools/audit_runtime_localization.py core/src "$catalogue" --fail-on-missing
          done
          node --test telegram/test-*.mjs
          node --test telegram-worker/test/*.mjs

      - name: Build GWT game
        run: |
          chmod +x gradlew
          ./gradlew --no-daemon html:dist

      - name: Package Telegram Mini App
        run: node telegram/build-telegram.mjs html/build/dist site

      - name: Validate deployable site
        run: |
          test -f site/index.html
          test -f site/.nojekyll
          test -f site/telegram-storage.js
          test -f site/privacy.html
          test -f site/html/html.nocache.js
          for layout in font1x font15x font2x font25x font3x; do
            grep -q "t:${layout}-layout.txt:" site/assets/assets.txt
          done
          test ! -d site/WEB-INF
          test ! -d site/html/gwt
          test ! -f site/html/html.devmode.js
          test ! -f site/html/compilation-mappings.txt
          test ! -f site/stars-config.js
          grep -q '<title>Telegram Pixel Dungeon</title>' site/index.html
          grep -q '<html lang="en">' site/index.html
          grep -q 'name="application-name" content="Telegram Pixel Dungeon"' site/index.html
          grep -Eq 'telegram\.css\?v=[0-9a-f]{12}' site/index.html
          grep -Eq 'telegram-bootstrap\.js\?v=[0-9a-f]{12}' site/index.html
          test "$(grep -o 'telegram-bootstrap\.js' site/index.html | wc -l)" -eq 1
          ! grep -Eq 'src="(\./)?html/html\.nocache\.js' site/index.html
          ! grep -R -q -E "openDonation|Telegram Stars|Support with Telegram Stars" site
          ! grep -R -q -E "Pixel Dungeon // Game|Telegram Edition|Play Pixel Dungeon" site
          ! grep -q "SuperDev Refresh" site/index.html

      - name: Configure GitHub Pages
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5

      - name: Upload GitHub Pages artifact
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b # v4
        with:
          path: site

  deploy:
    needs: build
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
